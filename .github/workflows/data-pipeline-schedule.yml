# Phase 6 — Scheduler: run Data Phase pipeline (scrape → chunk → embed) on a schedule.
# Keeps cleaned/, chunks/, embeddings/, and manifest/ up to date.
# Trigger: daily at 02:00 UTC; also manually via "Run workflow" in Actions tab.

name: Data pipeline (schedule)

on:
  schedule:
    # Run daily at 02:00 UTC (e.g. 07:30 IST)
    - cron: "0 2 * * *"
  workflow_dispatch:
    # Allow manual run from GitHub Actions UI

jobs:
  run-data-pipeline:
    name: Scrape, chunk, embed
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "Phase 01- data"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Chrome (for Selenium scrape)
        uses: browser-actions/setup-chrome@v1
        with:
          install-chromedriver: true

      - name: Cache sentence-transformers model
        uses: actions/cache@v4
        with:
          path: ~/.cache/torch
          key: st-models-${{ runner.os }}-${{ hashFiles('Phase 01- data/requirements.txt') }}
          restore-keys: st-models-${{ runner.os }}-

      - name: Install Phase 01 dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run data pipeline
        run: python run_data_phase.py
        env:
          CI: true

      - name: Persist artifacts (chunks, embeddings, manifest)
        uses: actions/upload-artifact@v4
        with:
          name: data-phase-artifacts
          path: |
            Phase 01- data/chunks/
            Phase 01- data/embeddings/
            Phase 01- data/manifest/
            Phase 01- data/cleaned/
            Phase 01- data/last_scraped.txt
            Phase 01- data/data_review.json

      - name: Summary
        run: |
          echo "Pipeline completed. Artifacts uploaded."
          if [ -f last_scraped.txt ]; then cat last_scraped.txt; fi
